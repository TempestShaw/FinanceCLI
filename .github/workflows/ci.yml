name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    env:
      PIP_NO_CACHE_DIR: "1"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: python -m pip install -U pip ".[dev]"

      - name: Run tests
        run: python -m pytest -q

  docs:
    name: Docs build
    runs-on: ubuntu-latest
    env:
      ASTRO_TELEMETRY_DISABLED: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install package
        run: python -m pip install -U pip -e .

      - name: Install docs site dependencies
        working-directory: docs-site
        run: npm ci

      - name: Generate command reference
        run: python scripts/generate_cli_docs.py

      - name: Check generated command reference
        run: git diff --exit-code docs-site/src/content/docs/commands.md

      - name: Build docs site
        working-directory: docs-site
        run: npm run build

  package:
    name: Package check
    runs-on: ubuntu-latest
    env:
      PIP_NO_CACHE_DIR: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: python -m pip install -U pip ".[dev]"

      - name: Build package
        run: python -m build

      - name: Check package metadata
        run: python -m twine check dist/*
